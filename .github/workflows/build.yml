name: Build APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle-8.4-bin.zip
          unzip -q /tmp/gradle-8.4-bin.zip -d /tmp/
          mkdir -p gradle/wrapper
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Fix gitignore
        run: |
          cat > .gitignore << 'EOF'
          *.zip
          *.jar
          !gradle/wrapper/gradle-wrapper.jar
          .gradle/
          build/
          local.properties
          EOF

      - name: Fix settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DocScanner"
          include ':app'
          EOF

      - name: Fix root build.gradle
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: Fix app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.docscanner'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.docscanner"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.camera:camera-core:1.3.1'
              implementation 'androidx.camera:camera-camera2:1.3.1'
              implementation 'androidx.camera:camera-lifecycle:1.3.1'
              implementation 'androidx.camera:camera-view:1.3.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          EOF

      - name: Fix resources
        run: |
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">DocScanner</string>
          </resources>
          EOF
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.DocScanner" parent="Theme.Material3.Dark">
                  <item name="colorPrimary">#4FC3F7</item>
                  <item name="colorOnPrimary">#000000</item>
                  <item name="colorSurface">#1E1E1E</item>
                  <item name="colorBackground">#121212</item>
                  <item name="android:windowBackground">#121212</item>
                  <item name="android:statusBarColor">#121212</item>
                  <item name="android:navigationBarColor">#121212</item>
              </style>
          </resources>
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.DocScanner"
                  android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".CameraActivity" />
                  <activity android:name=".CropActivity" />
                  <activity android:name=".PreviewActivity" />
              </application>
          </manifest>
          EOF

      - name: Fix layout files
        run: |
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#121212">
              <com.google.android.material.appbar.AppBarLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#1E1E1E">
                  <com.google.android.material.appbar.MaterialToolbar
                      android:id="@+id/toolbar"
                      android:layout_width="match_parent"
                      android:layout_height="?attr/actionBarSize"
                      app:title="DocScanner"
                      app:titleTextColor="#4FC3F7" />
              </com.google.android.material.appbar.AppBarLayout>
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center"
                  app:layout_behavior="@string/appbar_scrolling_view_behavior">
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="📄"
                      android:textSize="80sp" />
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="16dp"
                      android:text="ยังไม่มีเอกสาร"
                      android:textColor="#9E9E9E"
                      android:textSize="18sp" />
                  <androidx.recyclerview.widget.RecyclerView
                      android:id="@+id/recyclerView"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:visibility="gone" />
              </LinearLayout>
              <com.google.android.material.floatingactionbutton.ExtendedFloatingActionButton
                  android:id="@+id/fabScan"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_gravity="bottom|end"
                  android:layout_margin="24dp"
                  android:text="สแกนเอกสาร"
                  android:textColor="#000000"
                  app:backgroundTint="#4FC3F7" />
          </androidx.coordinatorlayout.widget.CoordinatorLayout>
          EOF
          cat > app/src/main/res/layout/activity_camera.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
              <androidx.camera.view.PreviewView
                  android:id="@+id/previewView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#88000000"
                  android:orientation="horizontal"
                  android:padding="12dp">
                  <ImageButton
                      android:id="@+id/btnBack"
                      android:layout_width="48dp"
                      android:layout_height="48dp"
                      android:background="?attr/selectableItemBackgroundBorderless"
                      android:src="@android:drawable/ic_menu_close_clear_cancel"
                      android:tint="#FFFFFF" />
                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_gravity="center_vertical"
                      android:layout_weight="1"
                      android:gravity="center"
                      android:text="ถ่ายเอกสาร"
                      android:textColor="#FFFFFF"
                      android:textSize="18sp"
                      android:textStyle="bold" />
                  <ImageButton
                      android:id="@+id/btnFlash"
                      android:layout_width="48dp"
                      android:layout_height="48dp"
                      android:background="?attr/selectableItemBackgroundBorderless"
                      android:src="@android:drawable/ic_menu_upload"
                      android:tint="#FFFFFF" />
              </LinearLayout>
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_gravity="bottom"
                  android:background="#88000000"
                  android:gravity="center"
                  android:padding="32dp">
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnCapture"
                      android:layout_width="72dp"
                      android:layout_height="72dp"
                      android:text=""
                      app:backgroundTint="#FFFFFF"
                      app:cornerRadius="36dp" />
              </LinearLayout>
          </FrameLayout>
          EOF
          cat > app/src/main/res/layout/activity_crop.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
              <ImageView
                  android:id="@+id/imgDocument"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:scaleType="fitCenter" />
              <com.example.docscanner.CropOverlayView
                  android:id="@+id/cropOverlay"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="#88000000"
                  android:padding="16dp">
                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:gravity="center"
                      android:text="ปรับขอบเอกสาร"
                      android:textColor="#FFFFFF"
                      android:textSize="18sp"
                      android:textStyle="bold" />
              </LinearLayout>
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_gravity="bottom"
                  android:background="#88000000"
                  android:orientation="horizontal"
                  android:padding="16dp">
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnRetake"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_margin="8dp"
                      android:layout_weight="1"
                      android:text="ถ่ายใหม่"
                      android:textColor="#FFFFFF"
                      app:backgroundTint="#424242" />
                  <com.google.android.material.button.MaterialButton
                      android:id="@+id/btnConfirm"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_margin="8dp"
                      android:layout_weight="1"
                      android:text="ยืนยัน"
                      android:textColor="#000000"
                      app:backgroundTint="#4FC3F7" />
              </LinearLayout>
          </FrameLayout>
          EOF

      - name: Fix kotlin files
        run: |
          mkdir -p app/src/main/java/com/example/docscanner
          cat > app/src/main/java/com/example/docscanner/MainActivity.kt << 'EOF'
          package com.example.docscanner
          import android.content.Intent
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.google.android.material.floatingactionbutton.ExtendedFloatingActionButton
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  findViewById<ExtendedFloatingActionButton>(R.id.fabScan).setOnClickListener {
                      startActivity(Intent(this, CameraActivity::class.java))
                  }
              }
          }
          EOF
          cat > app/src/main/java/com/example/docscanner/CameraActivity.kt << 'EOF'
          package com.example.docscanner
          import android.content.Intent
          import android.os.Bundle
          import android.util.Log
          import android.widget.ImageButton
          import androidx.appcompat.app.AppCompatActivity
          import androidx.camera.core.*
          import androidx.camera.lifecycle.ProcessCameraProvider
          import androidx.camera.view.PreviewView
          import androidx.core.content.ContextCompat
          import com.google.android.material.button.MaterialButton
          import java.io.File
          import java.text.SimpleDateFormat
          import java.util.*
          class CameraActivity : AppCompatActivity() {
              private lateinit var previewView: PreviewView
              private lateinit var btnCapture: MaterialButton
              private lateinit var btnBack: ImageButton
              private lateinit var btnFlash: ImageButton
              private var imageCapture: ImageCapture? = null
              private var flashEnabled = false
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_camera)
                  previewView = findViewById(R.id.previewView)
                  btnCapture = findViewById(R.id.btnCapture)
                  btnBack = findViewById(R.id.btnBack)
                  btnFlash = findViewById(R.id.btnFlash)
                  startCamera()
                  btnCapture.setOnClickListener { takePhoto() }
                  btnBack.setOnClickListener { finish() }
                  btnFlash.setOnClickListener { toggleFlash() }
              }
              private fun startCamera() {
                  val future = ProcessCameraProvider.getInstance(this)
                  future.addListener({
                      val provider = future.get()
                      val preview = Preview.Builder().build().also {
                          it.setSurfaceProvider(previewView.surfaceProvider)
                      }
                      imageCapture = ImageCapture.Builder()
                          .setCaptureMode(ImageCapture.CAPTURE_MODE_MAXIMIZE_QUALITY).build()
                      provider.unbindAll()
                      provider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, preview, imageCapture)
                  }, ContextCompat.getMainExecutor(this))
              }
              private fun takePhoto() {
                  val capture = imageCapture ?: return
                  val file = File(getExternalFilesDir(null),
                      "SCAN_${SimpleDateFormat("yyyyMMdd_HHmmss", Locale.US).format(Date())}.jpg")
                  capture.takePicture(
                      ImageCapture.OutputFileOptions.Builder(file).build(),
                      ContextCompat.getMainExecutor(this),
                      object : ImageCapture.OnImageSavedCallback {
                          override fun onImageSaved(output: ImageCapture.OutputFileResults) {
                              startActivity(Intent(this@CameraActivity, CropActivity::class.java)
                                  .putExtra("imagePath", file.absolutePath))
                          }
                          override fun onError(exc: ImageCaptureException) {
                              Log.e("Camera", "failed: ${exc.message}")
                          }
                      })
              }
              private fun toggleFlash() {
                  flashEnabled = !flashEnabled
                  imageCapture?.flashMode = if (flashEnabled)
                      ImageCapture.FLASH_MODE_ON else ImageCapture.FLASH_MODE_OFF
              }
          }
          EOF
          cat > app/src/main/java/com/example/docscanner/CropActivity.kt << 'EOF'
          package com.example.docscanner
          import android.content.Intent
          import android.graphics.Bitmap
          import android.graphics.BitmapFactory
          import android.os.Bundle
          import android.widget.ImageView
          import androidx.appcompat.app.AppCompatActivity
          import com.google.android.material.button.MaterialButton
          import java.io.File
          class CropActivity : AppCompatActivity() {
              private lateinit var imgDocument: ImageView
              private lateinit var cropView: CropOverlayView
              private lateinit var btnConfirm: MaterialButton
              private lateinit var btnRetake: MaterialButton
              private var imagePath = ""
              private var originalBitmap: Bitmap? = null
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_crop)
                  imagePath = intent.getStringExtra("imagePath") ?: ""
                  imgDocument = findViewById(R.id.imgDocument)
                  cropView = findViewById(R.id.cropOverlay)
                  btnConfirm = findViewById(R.id.btnConfirm)
                  btnRetake = findViewById(R.id.btnRetake)
                  originalBitmap = BitmapFactory.decodeFile(imagePath)
                  imgDocument.setImageBitmap(originalBitmap)
                  btnRetake.setOnClickListener { finish() }
                  btnConfirm.setOnClickListener { cropAndNext() }
              }
              private fun cropAndNext() {
                  val bitmap = originalBitmap ?: return
                  val rect = cropView.getCropRect()
                  val scaleX = bitmap.width.toFloat() / imgDocument.width
                  val scaleY = bitmap.height.toFloat() / imgDocument.height
                  val left = (rect.left * scaleX).toInt().coerceIn(0, bitmap.width)
                  val top = (rect.top * scaleY).toInt().coerceIn(0, bitmap.height)
                  val width = (rect.width() * scaleX).toInt().coerceIn(1, bitmap.width - left)
                  val height = (rect.height() * scaleY).toInt().coerceIn(1, bitmap.height - top)
                  val cropped = Bitmap.createBitmap(bitmap, left, top, width, height)
                  val cropFile = File(getExternalFilesDir(null), "CROP_${System.currentTimeMillis()}.jpg")
                  cropFile.outputStream().use { cropped.compress(Bitmap.CompressFormat.JPEG, 95, it) }
                  startActivity(Intent(this, PreviewActivity::class.java)
                      .putExtra("croppedPath", cropFile.absolutePath))
              }
          }
          EOF
          cat > app/src/main/java/com/example/docscanner/CropOverlayView.kt << 'EOF'
          package com.example.docscanner
          import android.content.Context
          import android.graphics.*
          import android.util.AttributeSet
          import android.view.MotionEvent
          import android.view.View
          class CropOverlayView @JvmOverloads constructor(
              context: Context, attrs: AttributeSet? = null
          ) : View(context, attrs) {
              private var cropRect = RectF()
              private val cornerSize = 40f
              private val minSize = 100f
              private var draggingCorner = -1
              private val paintOverlay = Paint().apply { color = Color.argb(120, 0, 0, 0) }
              private val paintBorder = Paint().apply {
                  color = Color.parseColor("#4FC3F7"); strokeWidth = 3f
                  style = Paint.Style.STROKE; isAntiAlias = true
              }
              private val paintCorner = Paint().apply {
                  color = Color.parseColor("#4FC3F7"); strokeWidth = 6f
                  style = Paint.Style.STROKE; strokeCap = Paint.Cap.ROUND; isAntiAlias = true
              }
              private val paintGrid = Paint().apply {
                  color = Color.argb(80, 79, 195, 247); strokeWidth = 1f; style = Paint.Style.STROKE
              }
              override fun onSizeChanged(w: Int, h: Int, oldw: Int, oldh: Int) {
                  super.onSizeChanged(w, h, oldw, oldh)
                  cropRect = RectF(w * 0.1f, h * 0.15f, w * 0.9f, h * 0.85f)
              }
              override fun onDraw(canvas: Canvas) {
                  super.onDraw(canvas)
                  val path = Path().apply {
                      addRect(0f, 0f, width.toFloat(), height.toFloat(), Path.Direction.CW)
                      addRect(cropRect, Path.Direction.CCW)
                  }
                  canvas.drawPath(path, paintOverlay)
                  canvas.drawRect(cropRect, paintBorder)
                  val tw = cropRect.width() / 3; val th = cropRect.height() / 3
                  for (i in 1..2) {
                      canvas.drawLine(cropRect.left + tw*i, cropRect.top, cropRect.left + tw*i, cropRect.bottom, paintGrid)
                      canvas.drawLine(cropRect.left, cropRect.top + th*i, cropRect.right, cropRect.top + th*i, paintGrid)
                  }
                  val c = cornerSize
                  canvas.drawLine(cropRect.left, cropRect.top+c, cropRect.left, cropRect.top, paintCorner)
                  canvas.drawLine(cropRect.left, cropRect.top, cropRect.left+c, cropRect.top, paintCorner)
                  canvas.drawLine(cropRect.right-c, cropRect.top, cropRect.right, cropRect.top, paintCorner)
                  canvas.drawLine(cropRect.right, cropRect.top, cropRect.right, cropRect.top+c, paintCorner)
                  canvas.drawLine(cropRect.left, cropRect.bottom-c, cropRect.left, cropRect.bottom, paintCorner)
                  canvas.drawLine(cropRect.left, cropRect.bottom, cropRect.left+c, cropRect.bottom, paintCorner)
                  canvas.drawLine(cropRect.right-c, cropRect.bottom, cropRect.right, cropRect.bottom, paintCorner)
                  canvas.drawLine(cropRect.right, cropRect.bottom, cropRect.right, cropRect.bottom-c, paintCorner)
              }
              override fun onTouchEvent(event: MotionEvent): Boolean {
                  when (event.action) {
                      MotionEvent.ACTION_DOWN -> draggingCorner = getTouchedCorner(event.x, event.y)
                      MotionEvent.ACTION_MOVE -> { if (draggingCorner >= 0) { moveCorner(draggingCorner, event.x, event.y); invalidate() } }
                      MotionEvent.ACTION_UP -> draggingCorner = -1
                  }
                  return true
              }
              private fun getTouchedCorner(x: Float, y: Float): Int {
                  val t = 60f
                  listOf(PointF(cropRect.left,cropRect.top), PointF(cropRect.right,cropRect.top),
                      PointF(cropRect.left,cropRect.bottom), PointF(cropRect.right,cropRect.bottom))
                      .forEachIndexed { i, p -> if (Math.hypot((x-p.x).toDouble(),(y-p.y).toDouble()) < t) return i }
                  return -1
              }
              private fun moveCorner(corner: Int, x: Float, y: Float) {
                  when (corner) {
                      0 -> { if (cropRect.right-x > minSize) cropRect.left=x; if (cropRect.bottom-y > minSize) cropRect.top=y }
                      1 -> { if (x-cropRect.left > minSize) cropRect.right=x; if (cropRect.bottom-y > minSize) cropRect.top=y }
                      2 -> { if (cropRect.right-x > minSize) cropRect.left=x; if (y-cropRect.top > minSize) cropRect.bottom=y }
                      3 -> { if (x-cropRect.left > minSize) cropRect.right=x; if (y-cropRect.top > minSize) cropRect.bottom=y }
                  }
              }
              fun getCropRect(): RectF = cropRect
          }
          EOF
          cat > app/src/main/java/com/example/docscanner/PreviewActivity.kt << 'EOF'
          package com.example.docscanner
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          class PreviewActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
              }
          }
          EOF

      - name: Commit all fixes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git rm -r --cached . -f 2>/dev/null || true
          git add .gitignore
          git add gradle/
          git add gradlew
          git add settings.gradle
          git add build.gradle
          git add app/
          git commit -m "Fix large files and rebuild" || echo "Nothing to commit"
          git push

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DocScanner-debug
          path: app/build/outputs/apk/debug/app-debug.apk
