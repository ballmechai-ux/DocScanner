name: Build APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Verify project structure
        run: |
          echo "=== Checking files ==="
          ls -la
          ls -la app/ || echo "NO app/ folder"
          ls -la app/src/main/ || echo "NO src/main/"
          ls -la app/src/main/java/com/example/docscanner/ || echo "NO kotlin files"
          ls -la app/src/main/res/layout/ || echo "NO layout files"
          ls -la app/src/main/res/values/ || echo "NO values files"
          cat app/build.gradle || echo "NO app/build.gradle"
          cat settings.gradle || echo "NO settings.gradle"

      - name: Fix settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DocScanner"
          include ':app'
          EOF

      - name: Fix build.gradle root
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: Fix app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.docscanner'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.docscanner"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.camera:camera-core:1.3.1'
              implementation 'androidx.camera:camera-camera2:1.3.1'
              implementation 'androidx.camera:camera-lifecycle:1.3.1'
              implementation 'androidx.camera:camera-view:1.3.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          EOF

      - name: Commit fixed files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Fix gradle wrapper and build files" || echo "Nothing to commit"
          git push

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DocScanner-debug
          path: app/build/outputs/apk/debug/app-debug.apk
